<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="780" viewBox="0 0 1080 780" role="img" aria-labelledby="title description">
  <title id="title">Synthetic Codex Reset Credit Manager window example</title>
  <desc id="description">A fixed demonstration of the manager window showing automatic use on, 2030 timestamps, compatible Codex CLI, synchronized Windows time, a successful last result, and a scheduled reservation.</desc>
  <defs>
    <filter id="window-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#142033" flood-opacity="0.25"/>
    </filter>
    <style>
      .ui { font-family: "Segoe UI", Arial, sans-serif; }
      .caption { font-size: 21px; fill: #202124; }
      .muted { fill: #5c626b; }
      .value { font-size: 21px; fill: #202124; }
      .healthy { fill: #087443; font-weight: 600; }
      .button-text { font-size: 19px; fill: #202124; }
    </style>
  </defs>

  <rect width="1080" height="780" fill="#e9edf3"/>
  <g filter="url(#window-shadow)">
    <rect x="30" y="24" width="1020" height="724" rx="14" fill="#ffffff"/>
    <path d="M44 24h992a14 14 0 0 1 14 14v52H30V38a14 14 0 0 1 14-14z" fill="#f5f6f8"/>
    <path d="M30 90h1020" stroke="#d8dce2"/>
  </g>

  <g class="ui">
    <rect x="53" y="47" width="20" height="20" rx="5" fill="#0b6fce"/>
    <path d="M58 57h10M63 52v10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="84" y="64" font-size="20" fill="#202124">Codex Reset Credit Manager</text>
    <rect x="788" y="42" width="168" height="30" rx="15" fill="#e7f4ff" stroke="#aad5f4"/>
    <text x="872" y="62" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="0.8" fill="#075a9c">SYNTHETIC EXAMPLE</text>
    <g stroke="#3f4247" stroke-width="1.6" fill="none">
      <path d="M979 56h14"/>
      <rect x="1008" y="49" width="12" height="12"/>
      <path d="M1034 50l12 12m0-12-12 12"/>
    </g>

    <text x="72" y="145" font-size="32" font-weight="700" fill="#202124">Codex Reset Credit Manager</text>
    <text x="72" y="188" font-size="20" fill="#3f444b">Safely uses one selected reset credit about five minutes before it expires.</text>

    <g class="caption muted">
      <text x="72" y="249">Automatic use</text>
      <text x="72" y="293">Next credit expires</text>
      <text x="72" y="337">Scheduled use</text>
      <text x="72" y="381">Codex CLI</text>
      <text x="72" y="425">Windows time</text>
      <text x="72" y="469">Last result</text>
      <text x="72" y="513">Next reservation</text>
    </g>

    <g class="value">
      <text x="365" y="249" class="healthy">On</text>
      <text x="365" y="293">2030-01-01 10:00:00</text>
      <text x="365" y="337">2030-01-01 09:55:00</text>
      <text x="365" y="381" class="healthy">Compatible</text>
      <text x="365" y="425" class="healthy">Synchronized</text>
      <text x="365" y="469" class="healthy">SUCCEEDED</text>
      <text x="365" y="513" class="healthy">Scheduled</text>
    </g>

    <g>
      <rect x="72" y="566" width="222" height="54" rx="5" fill="#f7f7f7" stroke="#9ca1a8"/>
      <rect x="73.5" y="567.5" width="219" height="51" rx="4" fill="none" stroke="#ffffff"/>
      <text x="183" y="600" text-anchor="middle" class="button-text">Pause Automatic Use</text>

      <rect x="310" y="566" width="132" height="54" rx="5" fill="#f7f7f7" stroke="#9ca1a8"/>
      <rect x="311.5" y="567.5" width="129" height="51" rx="4" fill="none" stroke="#ffffff"/>
      <text x="376" y="600" text-anchor="middle" class="button-text">Check Now</text>

      <rect x="458" y="566" width="255" height="54" rx="5" fill="#f7f7f7" stroke="#9ca1a8"/>
      <rect x="459.5" y="567.5" width="252" height="51" rx="4" fill="none" stroke="#ffffff"/>
      <text x="585" y="600" text-anchor="middle" class="button-text">Troubleshoot and Logs</text>
    </g>

    <g transform="translate(72 672)">
      <circle cx="8" cy="-5" r="8" fill="#d7e9f8"/>
      <path d="M5-5l2 2 4-5" fill="none" stroke="#0b6fce" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="27" y="1" font-size="15" fill="#6b7078">Synthetic example · fixed demonstration data · no account information</text>
    </g>
  </g>
</svg>
